apiVersion: storage.k8s.io/v1
kind: StorageClass
provisioner: local.csi.openebs.io
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
metadata:
  name: openebs-lvm
parameters:
  fsType: ext4
  shared: "yes"
  storage: "lvm"
  volgroup: "vg1"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
provisioner: io.openebs.csi-mayastor
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
metadata:
  name: openebs-mayastor
parameters:
  protocol: nvmf
  repl: "3"
---
# NOTE: why not use lvm-thin
# - no shrinking in thin, only expansion is thin
# - once space is used and deleted later, it can not be added back the the pool
# - bad perfomance compared to thick
