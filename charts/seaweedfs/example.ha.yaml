defaultReplication: "100"

volumeTopology:
  hetzner-ax52-0:
    dataCenter: "dc0"
    nodeSelector:
      kubernetes.io/hostname: "hetzner-ax52-0"
    storageClassName: "openebs-lvm"
    rack: "rack1"
    requests:
      storage: 128Gi
    replicas: 1
  hetzner-ax52-1:
    dataCenter: "dc1"
    nodeSelector:
      kubernetes.io/hostname: "hetzner-ax52-1"
    storageClassName: "openebs-lvm"
    replicas: 1
    requests:
      storage: 128Gi
    rack: "rack1"
